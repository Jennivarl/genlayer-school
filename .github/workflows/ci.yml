name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
      NEXT_PUBLIC_PRIVY_APP_ID: ${{ secrets.NEXT_PUBLIC_PRIVY_APP_ID }}
      NEXT_PUBLIC_PRIVY_CLIENT_ID: ${{ secrets.NEXT_PUBLIC_PRIVY_CLIENT_ID }}
      NEXT_PUBLIC_PRIVY_LOGIN_METHODS: ${{ secrets.NEXT_PUBLIC_PRIVY_LOGIN_METHODS }}
      PRIVY_APP_ID: ${{ secrets.PRIVY_APP_ID }}
      PRIVY_APP_SECRET: ${{ secrets.PRIVY_APP_SECRET }}
      PRIVY_VERIFICATION_KEY: ${{ secrets.PRIVY_VERIFICATION_KEY }}
      PRIVY_AUTH_REQUIRED: ${{ secrets.PRIVY_AUTH_REQUIRED }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Validate Vercel config
        run: node -e "JSON.parse(require('fs').readFileSync('vercel.json','utf8')); console.log('vercel.json ok')"

      - name: Build
        run: npm run build

      - name: Verify Supabase schema
        if: ${{ env.NEXT_PUBLIC_SUPABASE_URL != '' && env.SUPABASE_SERVICE_ROLE_KEY != '' }}
        run: npm run verify:supabase

      - name: Skip Supabase schema verification
        if: ${{ env.NEXT_PUBLIC_SUPABASE_URL == '' || env.SUPABASE_SERVICE_ROLE_KEY == '' }}
        run: echo "Skipping Supabase verification because Supabase secrets are not configured."

      - name: Verify Privy auth config
        if: ${{ env.NEXT_PUBLIC_PRIVY_APP_ID != '' && (env.PRIVY_APP_SECRET != '' || env.PRIVY_VERIFICATION_KEY != '') }}
        run: npm run verify:auth -- --production

      - name: Skip Privy auth config verification
        if: ${{ env.NEXT_PUBLIC_PRIVY_APP_ID == '' || (env.PRIVY_APP_SECRET == '' && env.PRIVY_VERIFICATION_KEY == '') }}
        run: echo "Skipping Privy auth verification because Privy secrets are not configured."
